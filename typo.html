<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Typography Packs</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

header {
  text-align: center;
  padding: 30px;
  font-size: 2em;
}

.grid {
  display: grid;
  /* minmax(220px, 300px) impedisce alla card di superare i 300px */
  grid-template-columns: repeat(auto-fit, minmax(220px, 300px)); 
  gap: 50px;
  padding: 30px;
  justify-content: center; /* Centra le card nella pagina */
}

.card {
  background: #111;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.card img {
  width: 100%;
  height: auto;
  border-radius: 8px; /* Opzionale: arrotonda gli angoli dell'immagine */
  display: block;
}

/* Rimuovi la graffa extra che avevi qui */

.card h3 {
  font-size: 1.1em;
  margin: 15px 0;
}

}

.card a {
  display: block;
  margin-top: 10px;
  padding: 10px;
  background: #a600ff;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}

footer {
  text-align: center;
  padding: 30px;
  font-size: 2em;
}

</style>
</head>

<body>

<header>Typography</header>

<div class="grid">

  <div class="card">
    <img src="images/All I want is you.jpg">
    <h3>All I want is you</h3>
    <a href="https://drive.google.com/drive/folders/1Vi16rBNko6ZMpDmqJgeNiL3a4WJ34cXI?usp=sharing" target="_blank">Download</a>
  </div>

  <div class="card">
    <img src="images/Friends.jpg">
    <h3>Friends</h3>
    <a href="https://drive.google.com/drive/folders/1eis1kYxScsUhx55vyLkK2jFywgtRVLVS?usp=sharing" target="_blank">Download</a>
  </div>

</div>

</body>
</html>
