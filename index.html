<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>M1styc</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Lexend";
  background: linear-gradient(#000, #a600ff);
  color: white;
}

header {
  text-align: center;
  padding: 30px;
  font-size: 2em;
}

nav ul {
  display: flex;
  justify-content: center;
  gap: 40px;
  list-style: none;
  background: #111;
  padding: 15px;
}

nav a {
  color: white;
  text-decoration: none;
}

/* CATEGORIE */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
  padding: 40px;
}

.card {
  background: #111;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
  text-align: center;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #a600ff;
}

.card img {
  width: 100%;
}

.card a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<header id="n1">M1STYC</header>

<nav>
  <ul>
    <li><a href="#n1">Home</a></li>
    <li><a href="#n2">Projects</a></li>
  </ul>
</nav>

<section id="n2">
  <h2 style="text-align:center;">Free Project Files</h2>

  <div class="grid">

    <div class="card">
      <a href="typo.html">
        <h3>Typography</h3>
      </a>
    </div>

    <div class="card">
      <a href="seamless.html">
        <h3>Seamless</h3>
      </a>
    </div>

    <div class="card">
      <a href="animation.html">
        <h3>Animation</h3>
      </a>
    </div>

  </div>
</section>

</body>
</html>
