<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>M1styc</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #a600ff;
  --bg-dark: #080808;
  --card-bg: rgba(255, 255, 255, 0.05);
  --text-main: #ffffff;
  --text-dim: #b0b0b0;
}

body {
  margin: 0;
  font-family: "Lexend", sans-serif;
  background: radial-gradient(circle at top right, #1a0029, var(--bg-dark));
  background-attachment: fixed;
  color: var(--text-main);
  line-height: 1.6;
}

/* HEADER & NAV */
header {
  text-align: center;
  padding: 60px 20px 20px;
  font-size: 3em;
  font-weight: 800;
  letter-spacing: -2px;
  background: linear-gradient(to bottom, var(--primary), #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

nav {
  position: sticky;
  top: 20px;
  z-index: 1000;
  display: flex;
  justify-content: center;
}

nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
  background: rgba(17, 17, 17, 0.8);
  backdrop-filter: blur(10px);
  padding: 12px 40px;
  border-radius: 50px;
  border: 1px solid rgba(166, 0, 255, 0.2);
  margin: 0;
}

nav a {
  color: var(--text-dim);
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

nav a:hover {
  color: var(--primary);
  text-shadow: 0 0 10px rgba(166, 0, 255, 0.5);
}

/* SECTION TITLE */
h2 {
  font-weight: 600;
  margin-top: 80px;
  color: var(--text-main);
  opacity: 0.9;
}

/* GRID & CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  padding: 40px;
  max-width: 1200px;
  margin: 0 auto;
}

.card {
  background: var(--card-bg);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
}

.card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(45deg, transparent, rgba(166, 0, 255, 0.1));
  pointer-events: none;
}

.card:hover {
  transform: translateY(-10px);
  border-color: var(--primary);
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(166, 0, 255, 0.2);
  background: rgba(255, 255, 255, 0.08);
}

.card a {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 180px; /* Altezza fissa per le categorie */
  color: white;
  text-decoration: none;
  padding: 20px;
}

.card h3 {
  margin: 0;
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: 1px;
}

.card span {
  font-size: 0.8rem;
  color: var(--primary);
  text-transform: uppercase;
  margin-top: 10px;
  font-weight: 700;
  letter-spacing: 2px;
}

/* Scrollbar personalizzata */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

</style>
</head>

<body>

<header id="n1">M1STYC</header>

<nav>
  <ul>
    <li><a href="#n1">Home</a></li>
    <li><a href="#n2">Projects</a></li>
  </ul>
</nav>

<section id="n2">
  <h2 style="text-align:center;">Free Project Files</h2>

  <div class="grid">

    <div class="card">
      <a href="typo.html">
        <h3>Typography</h3>
        <span>View Collection</span>
      </a>
    </div>

    <div class="card">
      <a href="seamless.html">
        <h3>Seamless</h3>
        <span>View Collection</span>
      </a>
    </div>

    <div class="card">
      <a href="animation.html">
        <h3>Animation</h3>
        <span>View Collection</span>
      </a>
    </div>

  </div>
</section>

</body>
</html>
