<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>M1styc</title>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin: 0;
  font-family: "Lexend";
  background: linear-gradient(#000000, #a600ff);
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 30px;
  font-size: 2em;
  font-weight: bold;
}

/* NAV */
nav ul {
  display: flex;
  justify-content: center;
  gap: 40px;
  list-style: none;
  background: #111;
  padding: 15px;
  position: sticky;
  top: 0;
}

nav a {
  color: white;
  text-decoration: none;
}

/* SEZIONI */
section {
  padding: 40px 20px;
  text-align: center;
}

/* GRID PROGETTI */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 20px;
}

/* CARD */
.card {
  background: #111;
  border-radius: 15px;
  padding: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #a600ff;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card a {
  display: block;
  margin-top: 10px;
  padding: 10px;
  background: #a600ff;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}

/* FILTRI */
.filters button {
  margin: 5px;
  padding: 10px;
  border: none;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.filters button:hover {
  background: #a600ff;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}

</style>

<script>
function filterSelection(category) {
  let cards = document.getElementsByClassName("card");

  for (let i = 0; i < cards.length; i++) {
    if (category === "all") {
      cards[i].style.display = "block";
    } else {
      cards[i].style.display = cards[i].classList.contains(category)
        ? "block"
        : "none";
    }
  }
}
</script>

</head>

<body>

<header id="n1">M1STYC</header>

<nav>
  <ul>
    <li><a href="#n1">Home</a></li>
    <li><a href="#n2">About</a></li>
    <li><a href="#n3">Projects</a></li>
    <li><a href="#n4">Shop</a></li>
  </ul>
</nav>

<!-- ABOUT -->
<section id="n2">
  <h2>Chi sono</h2>
  <p>Michele Gonzalez, editor After Effects. Creo preset, pack e progetti per editing.</p>
</section>

<!-- PROGETTI -->
<section id="n3">
  <h2>Free Project Files</h2>

  <div class="filters">
    <button onclick="filterSelection('all')">All</button>
    <button onclick="filterSelection('shake')">Shake</button>
    <button onclick="filterSelection('text')">Text</button>
    <button onclick="filterSelection('glow')">Glow</button>
  </div>

  <div class="grid">

    <div class="card shake">
      <img src="cover1.jpg">
      <h3>Shake Pack</h3>
      <a href="LINK_DRIVE_1" target="_blank">Download</a>
    </div>

    <div class="card glow">
      <img src="cover2.jpg">
      <h3>Glow Pack</h3>
      <a href="LINK_DRIVE_2" target="_blank">Download</a>
    </div>

    <div class="card text">
      <img src="cover3.jpg">
      <h3>Text Pack</h3>
      <a href="LINK_DRIVE_3" target="_blank">Download</a>
    </div>

  </div>
</section>

<!-- SHOP -->
<section id="n4">
  <h2>Shop</h2>
  <p>Coming soon</p>
</section>

<footer>
  © 2026 M1styc
</footer>

</body>
</html>
